<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Yellow background circle -->
  <circle cx="100" cy="100" r="95" fill="#FCD34D" stroke="#6B21A8" stroke-width="3"/>

  <!-- Purple gradient background -->
  <defs>
    <linearGradient id="purpleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6B21A8;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#7E22CE;stop-opacity:0.8" />
    </linearGradient>
  </defs>

  <!-- Building/Academy shape -->
  <rect x="50" y="70" width="100" height="70" fill="url(#purpleGradient)" rx="5"/>

  <!-- Windows -->
  <rect x="60" y="80" width="12" height="12" fill="#FCD34D" rx="2"/>
  <rect x="78" y="80" width="12" height="12" fill="#FCD34D" rx="2"/>
  <rect x="96" y="80" width="12" height="12" fill="#FCD34D" rx="2"/>
  <rect x="114" y="80" width="12" height="12" fill="#FCD34D" rx="2"/>

  <rect x="60" y="100" width="12" height="12" fill="#FCD34D" rx="2"/>
  <rect x="78" y="100" width="12" height="12" fill="#FCD34D" rx="2"/>
  <rect x="96" y="100" width="12" height="12" fill="#FCD34D" rx="2"/>
  <rect x="114" y="100" width="12" height="12" fill="#FCD34D" rx="2"/>

  <!-- Door -->
  <rect x="90" y="115" width="20" height="25" fill="#6B21A8" rx="2"/>
  <circle cx="108" cy="127" r="2" fill="#FCD34D"/>

  <!-- Flag/Roof accent -->
  <polygon points="100,70 110,60 100,65" fill="#DC2626"/>
  <polygon points="100,70 90,60 100,65" fill="#FB923C"/>

  <!-- Text badge below -->
  <circle cx="100" cy="165" r="25" fill="#6B21A8"/>
  <text x="100" y="172" font-size="24" font-weight="bold" fill="#FCD34D" text-anchor="middle" font-family="Arial, sans-serif">RVA</text>
</svg>